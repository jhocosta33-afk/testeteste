<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro | Dashboard NASDAQ PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --bg: #020617;
  --card: #0f172a;
  --border: rgba(255,255,255,.1);
  --text: #e5e7eb;
  --text-muted: #94a3b8;
  --accent: #22c55e;
  --red: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  max-width: 450px;
  width: 100%;
}

.header {
  text-align: center;
  margin-bottom: 32px;
}

.logo {
  font-size: 48px;
  margin-bottom: 12px;
}

h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 14px;
  color: var(--text-muted);
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 14px;
  color: var(--text);
  transition: all .2s ease;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(255,255,255,0.08);
}

input::placeholder {
  color: var(--text-muted);
}

.btn {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s ease;
  margin-top: 8px;
}

.btn:hover {
  background: #16a34a;
  transform: scale(1.02);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.alert {
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 14px;
  display: none;
}

.alert.success {
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: var(--accent);
}

.alert.error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: var(--red);
}

.info-box {
  background: rgba(59, 130, 246, 0.1);
  border: 1px solid rgba(59, 130, 246, 0.3);
  border-radius: 8px;
  padding: 16px;
  margin-top: 20px;
  font-size: 13px;
  color: #60a5fa;
  line-height: 1.6;
}

.back-link {
  text-align: center;
  margin-top: 20px;
}

.back-link a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  transition: color .2s;
}

.back-link a:hover {
  color: var(--accent);
}

@media (max-width: 480px) {
  .container { max-width: 100%; }
  .card { padding: 24px; }
  h1 { font-size: 24px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">✨</div>
    <h1>Criar Conta</h1>
    <p class="subtitle">Cadastre-se e aguarde aprovação</p>
  </div>

  <div class="card">
    <div id="alert" class="alert"></div>

    <form id="cadastroForm">
      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="João Silva" required>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="joao@exemplo.com" required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>

      <div class="form-group">
        <label for="confirmarSenha">Confirmar Senha</label>
        <input type="password" id="confirmarSenha" placeholder="Digite a senha novamente" required>
      </div>

      <button type="submit" class="btn" id="btnCadastro">Criar Conta</button>
    </form>

    <div class="info-box">
      <strong>ℹ️ Importante:</strong><br>
      Após o cadastro, sua conta será analisada pelo administrador. Você receberá acesso assim que for aprovado.
    </div>

    <div class="back-link">
      <a href="../">← Voltar ao Dashboard</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
document.addEventListener('supabase-ready', inicializarCadastro);
if (window._supabase) inicializarCadastro();

function inicializarCadastro() {
  const sb = window._supabase;
  const form = document.getElementById('cadastroForm');
  const alertBox = document.getElementById('alert');
  const btnCadastro = document.getElementById('btnCadastro');

  if (!sb || !form || form.dataset.ready === '1') return;
  form.dataset.ready = '1';

  function mostrarAlerta(mensagem, tipo) {
    alertBox.textContent = mensagem;
    alertBox.className = `alert ${tipo}`;
    alertBox.style.display = 'block';

    if (tipo === 'success') {
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1800);
    }
  }

  sb.auth.getSession().then(async ({ data: { session } }) => {
    if (!session?.user) return;
    try {
      const { data: userData } = await sb.from('users').select('role, aprovado').eq('id', session.user.id).single();
      if (userData?.role === 'admin') {
        window.location.href = 'admin.html';
        return;
      }
      if (userData?.aprovado === true) {
        window.location.href = 'aluno.html';
        return;
      }
    } catch (e) {}
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const confirmarSenha = document.getElementById('confirmarSenha').value;

    if (!nome) {
      mostrarAlerta('❌ Informe seu nome completo.', 'error');
      return;
    }

    if (senha !== confirmarSenha) {
      mostrarAlerta('❌ As senhas não coincidem.', 'error');
      return;
    }

    if (senha.length < 6) {
      mostrarAlerta('❌ A senha deve ter no mínimo 6 caracteres.', 'error');
      return;
    }

    btnCadastro.disabled = true;
    btnCadastro.textContent = 'Criando conta...';

    try {
      const { data, error } = await sb.auth.signUp({
        email,
        password: senha,
        options: {
          data: {
            full_name: nome
          }
        }
      });

      if (error) throw error;

      const user = data.user;
      if (!user?.id) throw new Error('Não foi possível criar o usuário.');

      const { error: upsertError } = await sb.from('users').upsert({
        id: user.id,
        nome,
        email,
        role: 'aluno',
        aprovado: false,
        created_at: new Date().toISOString()
      });

      if (upsertError) throw upsertError;

      await sb.auth.signOut();
      mostrarAlerta('✅ Conta criada com sucesso! Aguarde aprovação do administrador.', 'success');
    } catch (error) {
      console.error('Erro no cadastro:', error);

      let mensagem = '❌ Erro ao criar conta. ';
      const msg = error?.message || '';

      if (msg.includes('User already registered')) {
        mensagem += 'Este e-mail já está cadastrado.';
      } else if (msg.includes('Invalid email')) {
        mensagem += 'E-mail inválido.';
      } else if (msg.includes('Password should be at least')) {
        mensagem += 'A senha é muito curta.';
      } else {
        mensagem += msg;
      }

      mostrarAlerta(mensagem, 'error');
      btnCadastro.disabled = false;
      btnCadastro.textContent = 'Criar Conta';
    }
  });
}
</script>

</body>
</html>
